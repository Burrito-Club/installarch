<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstallArch - Practice Terminal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="terminal">
        <div class="terminal-header">root@archlinux ~ #</div>
        <div class="terminal-content" id="terminalContent">
            <div class="terminal-line">Welcome to InstallArch - Arch Linux Installation Practice</div>
            <div class="terminal-line">Type 'help' to see available commands</div>
            <div class="terminal-line"></div>
        </div>
        <div class="terminal-input">
            <span class="prompt">root@archlinux ~ #</span>
            <input type="text" id="commandInput" autofocus>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
