<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstallArch Terminal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            font-family: 'IBM Plex Mono', 'Courier New', monospace;
            height: 100vh;
            padding: 20px;
        }

        .terminal {
            width: 100%;
            height: 100%;
            background-color: #000000;
            color: #ffffff;
            padding: 20px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.5;
            font-family: 'IBM Plex Mono', 'Courier New', monospace;
        }

        .terminal-line {
            min-height: 1.5em;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        input {
            background-color: transparent;
            border: none;
            color: #ffffff;
            font-family: 'IBM Plex Mono', 'Courier New', monospace;
            font-size: 14px;
            outline: none;
            width: 100%;
        }

        input::placeholder {
            color: #666666;
        }

        .terminal::-webkit-scrollbar {
            width: 8px;
        }

        .terminal::-webkit-scrollbar-track {
            background: #000000;
        }

        .terminal::-webkit-scrollbar-thumb {
            background: #444444;
        }

        .terminal::-webkit-scrollbar-thumb:hover {
            background: #666666;
        }
    </style>
</head>
<body>
    <div class="terminal" id="terminal">
        <div class="terminal-line" id="inputLine">
            <input type="text" id="commandInput" autofocus>
        </div>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        
        function createInputLine() {
            const inputLine = document.createElement('div');
            inputLine.className = 'terminal-line';
            inputLine.id = 'inputLine';
            
            const newInput = document.createElement('input');
            newInput.type = 'text';
            newInput.id = 'commandInput';
            newInput.autofocus = true;
            
            inputLine.appendChild(newInput);
            terminal.appendChild(inputLine);
            
            // Focus new input
            newInput.focus();
            
            // Scroll to bottom
            terminal.scrollTop = terminal.scrollHeight;
            
            // Add event listener to new input
            newInput.addEventListener('keydown', handleKeydown);
        }
        
        function handleKeydown(event) {
            if (event.key === 'Enter') {
                const text = event.target.value;
                
                // Create new line with the typed text
                const newLine = document.createElement('div');
                newLine.className = 'terminal-line';
                newLine.textContent = text;
                
                // Replace input line with output line
                const inputLine = document.getElementById('inputLine');
                inputLine.replaceWith(newLine);
                
                // Create new input line
                createInputLine();
            }
        }
        
        // Initial event listener
        document.getElementById('commandInput').addEventListener('keydown', handleKeydown);
    </script>
</body>
</html>
